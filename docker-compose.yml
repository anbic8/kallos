services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: ${DB_USER:-judoapp}
      POSTGRES_PASSWORD: ${DB_PASSWORD:?DB_PASSWORD muss gesetzt sein}
      POSTGRES_DB: ${DB_NAME:-judoapp}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-judoapp}"]
      interval: 5s
      timeout: 5s
      retries: 10

  backend:
    build: ./backend
    environment:
      DATABASE_URL: postgresql://${DB_USER:-judoapp}:${DB_PASSWORD}@db:5432/${DB_NAME:-judoapp}
      SECRET_KEY: ${SECRET_KEY:?SECRET_KEY muss gesetzt sein}
      ADMIN_EMAIL: ${ADMIN_EMAIL:-admin@judoapp.de}
      ADMIN_PASSWORD: ${ADMIN_PASSWORD:?ADMIN_PASSWORD muss gesetzt sein}
      MEDIA_DIR: /app/media
      ALLOWED_ORIGINS: ${ALLOWED_ORIGINS:-http://localhost:8002}
      HEIMVEREIN_NAME: ${HEIMVEREIN_NAME:-Mein Judoverein}
    volumes:
      - media_data:/app/media
    depends_on:
      db:
        condition: service_healthy
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/api/health')"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s

  frontend:
    build: ./frontend
    ports:
      - "8002:80"
    volumes:
      - media_data:/app/media:ro
    depends_on:
      backend:
        condition: service_healthy
    restart: unless-stopped

  adminer:
    image: adminer:latest
    ports:
      - "9002:8080"
    depends_on:
      - db
    restart: unless-stopped

volumes:
  postgres_data:
  media_data:
